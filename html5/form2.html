<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pitha ghor</title>

    <style>

       form .basic label{
           display: block;
           margin-top: 10px;
       }

    </style>



</head>
<body>
    <header>



    </header>

<main>

    <section>
        <h2>jamal ar pitha ghor</h2>
        <form>

            <fieldset class="basic">

                <legend>personal info</legend>

                <label for="name">your name</label>
            <input type="" name="" id="name">
<!-- label ar for and input ar id same thaka lagbe -->

            <label for="email">your mail address</label>
            <input type="email" name="" id="email">





            </fieldset>

            


            <fieldset> 
                <!-- field set hoitese shob element re akta border ba box ar modde rakhe . eita akta formal form ar kaj kore -->

                <!-- legend hoitese title ei box ar -->

                <legend>pitha info</legend>
              
                <label for="chitoi">chitoi</label> 
                <input type="radio" name="pitha" id="chitoi">


                <input type="radio" name="pitha" id="">
                <label for="">chitoi</label>

                <!-- input age likhe ager ashbe and label pore likhle pore ashbe -->


                <input type="radio" name="pitha" id="vapa">
                <label for="vapa">vapa</label>

                <input type="radio" name="pitha" id="puri">
                <label for="puri">dal puri</label>


                <!-- shb gular input ar nam pitha karon shob gula e pitha . ami jeikono akta select korte parbo  -->

            </fieldset>


            <fieldset>

                <legend>borta selection</legend>

                <input type="checkbox" name="borta" id="sorisha">
                <label for="sorisha">sorisha</label>

                <input type="checkbox" name="borta" id="sutki">
                <label for="sutki">sutki</label>

                <input type="checkbox" name="borta" id="morich">
                <label for="morich">morich jhal</label>
            </fieldset>


            <fieldset>

                <legend>extra info</legend>
               <textarea cols="40" rows="5" name="" id=""></textarea>


<!-- cols mane total koy coloum ar jayga nibo and rows mane total koyta character ar jayga nibo  -->

            </fieldset>

            <input type="submit" value="submit this form">
            <input type="reset" value="clear this form">

        </form>





    </section>




</main>


<footer>




</footer>


</body>
</html>
